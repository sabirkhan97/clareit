<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FA3C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E7A;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer C circle -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#blueGradient)" stroke-width="28" stroke-dasharray="267" stroke-dashoffset="80"/>
  
  <!-- Code brackets < in light blue -->
  <g transform="translate(70, 75)">
    <polyline points="15,0 0,15 15,30" fill="none" stroke="#5FB3D5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Code brackets > in light blue -->
  <g transform="translate(110, 75)">
    <polyline points="0,0 15,15 0,30" fill="none" stroke="#5FB3D5" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Orange slash / -->
  <line x1="92" y1="60" x2="108" y2="140" stroke="#FF9500" stroke-width="6" stroke-linecap="round"/>
</svg>
